name: validate-skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - '.agents/skills/**'
  pull_request:
    paths:
      - 'skills/**'
      - '.agents/skills/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate skills
        run: npx tsx skills/validate-skill/scripts/validate-skills.mts
