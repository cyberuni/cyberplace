name: validate-skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - '.agents/skills/**'
      - 'src/**'
      - 'bin/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig.json'
      - 'tsdown.config.ts'
      - 'biome.jsonc'
      - '.github/workflows/validate-skills.yml'
  pull_request:
    paths:
      - 'skills/**'
      - '.agents/skills/**'
      - 'src/**'
      - 'bin/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig.json'
      - 'tsdown.config.ts'
      - 'biome.jsonc'
      - '.github/workflows/validate-skills.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify
        run: pnpm verify
