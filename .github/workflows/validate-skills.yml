name: validate-skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - '.agents/skills/**'
      - 'src/**'
      - 'bin/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig.json'
      - 'tsdown.config.ts'
      - 'biome.jsonc'
      - '.github/workflows/validate-skills.yml'
  pull_request:
    paths:
      - 'skills/**'
      - '.agents/skills/**'
      - 'src/**'
      - 'bin/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig.json'
      - 'tsdown.config.ts'
      - 'biome.jsonc'
      - '.github/workflows/validate-skills.yml'

jobs:
  validate:
    uses: cyberuni/.github/.github/workflows/pnpm-verify.yml@main
    with:
      os: '["ubuntu-latest"]'
      skip-playwright: true
