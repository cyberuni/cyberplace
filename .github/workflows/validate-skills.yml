name: validate-skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - '.agents/skills/**'
      - 'tests/**'
  pull_request:
    paths:
      - 'skills/**'
      - '.agents/skills/**'
      - 'tests/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Audit skills
        run: pnpm test:audit
